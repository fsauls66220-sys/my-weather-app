<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link 
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" 
      rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css" />    
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <title>My Weather App</title>
</head>
<body>
  <div class="weather-app">
    <header> 
      <form class="search-form" id="search-form">
         <input 
            type="search" 
            placeholder="Enter a city..."  
            required 
            id="search-input"
            class="search-form-input"
            />
         <input type="submit" value="Search" class="search-form-button" />  
        
      </form>
    </header>
    <main>
     <div class="weather-app-data">
       <div>
        <h1 class="weather-app-city" id="city"></h1>
        <p class="weather-app-details">
          Tuesday 14:49, scattered clouds
          <br />
          Humidity: 66%, Wind: 3.13km/h
        </p>
     </div>
     <div class="weather-app-temperature-container">
        <div class="weather-app-icon">⛅</div>
        <div class="weather-app-temperature" id="temperature"></div>
        <div class="weather-app-unit">°C</div>
       </div>
     </div>
    </main>

    <footer>This project was coded by 
        <a href="https://github.com/fsauls66220-sys/my-weather-app.git" target="_blank">Felicia Sauls</a>,
        is 
        <a href="https://github.com/fsauls66220-sys/my-weather-app.git" target="_blank">open-sourced on GitHub</a> and 
        <a href="https://my-fsauls-weather-app.netlify.app/" target="_blank"> hosted on Netlify</a>.
    </footer>
    </div>
  <script src="index.js"></script>
 </body>
</html>
